apiVersion: capabilities.naftiko.dev/v1
kind: Capability
metadata:
  name: svix-stream
  title: Svix Stream API
  description: |
    Event streaming surface — sinks, event types, pollers — for high-volume
    fan-out and pull-based consumption alongside push webhooks.
  tags:
    - Streaming
    - Event Stream
    - Sinks
    - Pollers
spec:
  provider: svix
  baseUrl: https://api.us.svix.com
  authentication:
    type: bearer
  openapi: ../../openapi/svix-openapi.json
  resources:
    - name: streams
      description: Top-level stream tenants.
      operations:
        - listStreams
        - createStream
        - getStream
        - updateStream
        - deleteStream
    - name: streamEventTypes
      description: Stream-scoped event type registry.
      operations:
        - listStreamEventTypes
        - createStreamEventType
        - getStreamEventType
        - updateStreamEventType
        - deleteStreamEventType
    - name: streamEvents
      description: Stream event ingestion endpoint.
      operations:
        - createStreamEvents
    - name: sinks
      description: Destinations a stream fans events out to.
      operations:
        - listStreamSinks
        - createStreamSink
        - getStreamSink
        - updateStreamSink
        - deleteStreamSink
        - rotateStreamSinkSecret
        - setStreamSinkTransformation
    - name: pollers
      description: Pull-based consumers for stream events with cursor seek.
      operations:
        - getPoller
        - getPollerConsumer
        - seekPollerConsumer
        - rotatePollerToken
